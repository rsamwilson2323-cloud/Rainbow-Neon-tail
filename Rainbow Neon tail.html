<!DOCTYPE html>
<html>
<head>
<title>Rainbow Trail</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #000;
    touch-action: none;
  }
  canvas {
    width: 100%;
    height: 100%;
    position: fixed;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
onresize = resize;

let points = [];
let isTouching = false;
let tx = 0, ty = 0;
let hue = 0;

// ADD POINT FUNCTION
function addPoint(x, y){
  points.push({
    x, y,
    size: 25,
    alpha: 1,
    hue: hue
  });
}

// TOUCH EVENTS (tap, move, hold)
document.addEventListener("touchstart", e=>{
  let t = e.touches[0];
  tx = t.clientX;
  ty = t.clientY;
  isTouching = true;
  addPoint(tx,ty); // tap splash
});

document.addEventListener("touchmove", e=>{
  let t = e.touches[0];
  tx = t.clientX;
  ty = t.clientY;
  isTouching = true;
});

document.addEventListener("touchend", ()=> isTouching = false);

// Mouse support for laptop
document.addEventListener("mousedown", e=>{
  tx = e.clientX;
  ty = e.clientY;
  isTouching = true;
  addPoint(tx,ty);
});
document.addEventListener("mousemove", e=>{
  if(isTouching){
    tx = e.clientX;
    ty = e.clientY;
  }
});
document.addEventListener("mouseup", ()=> isTouching = false);

// DRAW POINT
function drawPoint(p){
  ctx.save();
  ctx.globalAlpha = p.alpha;

  ctx.fillStyle = `hsl(${p.hue},100%,60%)`;

  ctx.shadowColor = `hsl(${p.hue},100%,60%)`;
  ctx.shadowBlur = 20;

  ctx.beginPath();
  ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// MAIN LOOP
function animate(){
  ctx.fillStyle = "rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Long press → continuous trail
  if(isTouching){
    addPoint(tx,ty);
  }

  // Draw and fade points
  points.forEach((p,i)=>{
    p.size *= 0.97;
    p.alpha -= 0.02;
    drawPoint(p);
    if(p.alpha <= 0) points.splice(i,1);
  });

  hue = (hue + 2) % 360; // keep changing color

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
